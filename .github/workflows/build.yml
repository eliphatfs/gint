name: Build

on:
  workflow_dispatch:

jobs:
  generate-fatbin:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.1-devel-ubuntu22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-venv xz-utils wget gnupg

      - name: Install LLVM 18
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" >> /etc/apt/sources.list
          apt-get update
          apt-get install -y llvm-18 clang-18
          ln -sf /usr/bin/llvm-link-18 /usr/bin/llvm-link
          ln -sf /usr/bin/clang-18 /usr/bin/clang
          ln -sf /usr/bin/opt-18 /usr/bin/opt

      - name: Install gint (codegen deps only)
        run: |
          python3 -m pip install --break-system-packages llvmlite rich numpy

      - name: Install gint package
        run: |
          python3 -m pip install --break-system-packages --no-deps -e .

      - name: Generate fatbin
        run: |
          export PATH="/usr/local/cuda/bin:$PATH"
          bash generate.sh

      - name: Upload fatbin
        uses: actions/upload-artifact@v4
        with:
          name: fatbin
          path: gint/host/cuda/gint.fatbin.xz

  build-wheel:
    needs: generate-fatbin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download fatbin
        uses: actions/download-artifact@v4
        with:
          name: fatbin
          path: gint/host/cuda/

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Verify wheel contents
        run: |
          python -c "
          import zipfile, sys, glob
          whl = glob.glob('dist/*.whl')[0]
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
              fatbin = [n for n in names if 'fatbin' in n]
              print(f'Wheel: {whl}')
              print(f'Total files: {len(names)}')
              print(f'Fatbin entries: {fatbin}')
              if not fatbin:
                  print('ERROR: fatbin not found in wheel!')
                  sys.exit(1)
              print('OK: fatbin included in wheel')
          "

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
